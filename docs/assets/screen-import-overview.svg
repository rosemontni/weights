<svg width="1440" height="960" viewBox="0 0 1440 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="960" fill="#F4F1EA"/>
  <rect x="72" y="88" width="1296" height="784" rx="36" fill="#FFFDF8" stroke="#D8D1C7" stroke-width="4"/>
  <rect x="124" y="136" width="380" height="688" rx="48" fill="#143B52"/>
  <rect x="144" y="168" width="340" height="624" rx="34" fill="#F8F5EE"/>
  <rect x="170" y="194" width="288" height="148" rx="24" fill="#FFFFFF" stroke="#D7D0C5"/>
  <text x="194" y="236" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#143B52">Wyze Scale Bridge</text>
  <text x="194" y="272" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#4D5D68">Import Wyze CSV and write</text>
  <text x="194" y="297" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#4D5D68">weight plus body fat into</text>
  <text x="194" y="322" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#4D5D68">Health Connect.</text>
  <rect x="194" y="372" width="115" height="40" rx="20" fill="#DCEEF6"/>
  <text x="214" y="398" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" fill="#1E4E6D">Available</text>
  <rect x="170" y="366" width="288" height="126" rx="24" fill="#FFFFFF" stroke="#D7D0C5"/>
  <text x="194" y="406" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#5D696F">Imported 18 Wyze measurements.</text>
  <rect x="194" y="436" width="108" height="42" rx="21" fill="#1E4E6D"/>
  <text x="213" y="463" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">Import CSV</text>
  <rect x="314" y="436" width="144" height="42" rx="21" fill="#D86C2B"/>
  <text x="334" y="463" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">Write to Health</text>
  <rect x="170" y="516" width="288" height="118" rx="24" fill="#FFFFFF" stroke="#D7D0C5"/>
  <text x="194" y="552" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#143B52">Latest measurement</text>
  <text x="194" y="590" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#D86C2B">82.4 kg   181.7 lb</text>
  <text x="194" y="620" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#5D696F">Body fat 19.5%   BMI 24.9</text>
  <rect x="170" y="658" width="288" height="108" rx="24" fill="#FFFFFF" stroke="#D7D0C5"/>
  <text x="194" y="694" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#143B52">Garmin note</text>
  <text x="194" y="724" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#5D696F">Health Connect is the clean bridge.</text>
  <text x="194" y="748" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#5D696F">Garmin support depends on its</text>
  <text x="194" y="770" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#5D696F">current Health Connect support.</text>
  <text x="572" y="196" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="700" fill="#143B52">Focused import flow</text>
  <text x="572" y="246" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#50606A">Bring a Wyze CSV into a small Android app that only asks</text>
  <text x="572" y="280" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#50606A">for the weight-related Health Connect permissions it needs.</text>
  <rect x="572" y="332" width="724" height="160" rx="28" fill="#143B52"/>
  <text x="612" y="390" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#FFFFFF">Why it matters</text>
  <text x="612" y="432" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#E9F0F4">Wyze can write to Health Connect directly, but it tends to ask for a broad</text>
  <text x="612" y="464" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#E9F0F4">permission range. This bridge keeps the sync surface narrow and auditable.</text>
  <rect x="572" y="532" width="220" height="188" rx="28" fill="#FFFFFF" stroke="#D7D0C5"/>
  <text x="604" y="580" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#143B52">1. Export</text>
  <text x="604" y="616" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#5D696F">Get your Wyze Scale</text>
  <text x="604" y="641" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#5D696F">history as CSV.</text>
  <rect x="824" y="532" width="220" height="188" rx="28" fill="#FFFFFF" stroke="#D7D0C5"/>
  <text x="856" y="580" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#143B52">2. Import</text>
  <text x="856" y="616" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#5D696F">Review the newest</text>
  <text x="856" y="641" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#5D696F">measurements in app.</text>
  <rect x="1076" y="532" width="220" height="188" rx="28" fill="#FFFFFF" stroke="#D7D0C5"/>
  <text x="1108" y="580" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#143B52">3. Sync</text>
  <text x="1108" y="616" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#5D696F">Write only weight and</text>
  <text x="1108" y="641" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#5D696F">body fat to Health.</text>
  <rect x="572" y="752" width="724" height="72" rx="24" fill="#FCE8DC" stroke="#F1C3A5"/>
  <text x="604" y="796" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600" fill="#9B4B17">This README uses illustrative app captures based on the current Compose UI.</text>
</svg>
