<svg width="1440" height="960" viewBox="0 0 1440 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="960" fill="#F4F1EA"/>
  <text x="92" y="126" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="700" fill="#143B52">Health Connect bridge, explained</text>
  <text x="92" y="176" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#576770">A safer path than broad app permissions, and the best chance of Garmin interoperability.</text>
  <rect x="88" y="254" width="280" height="248" rx="32" fill="#FFFDF8" stroke="#D7D0C5" stroke-width="3"/>
  <text x="124" y="314" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#143B52">Wyze Export</text>
  <text x="124" y="360" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#5E6B72">CSV history from</text>
  <text x="124" y="390" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#5E6B72">the scale app</text>
  <rect x="124" y="430" width="112" height="42" rx="21" fill="#DCEEF6"/>
  <text x="149" y="457" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#1E4E6D">Portable</text>
  <rect x="418" y="254" width="280" height="248" rx="32" fill="#143B52"/>
  <text x="454" y="314" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#FFFFFF">This App</text>
  <text x="454" y="360" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#E7EFF3">Imports CSV and writes</text>
  <text x="454" y="390" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#E7EFF3">only the needed records</text>
  <rect x="454" y="430" width="164" height="42" rx="21" fill="#D86C2B"/>
  <text x="479" y="457" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">Narrow permissions</text>
  <rect x="748" y="254" width="280" height="248" rx="32" fill="#FFFDF8" stroke="#D7D0C5" stroke-width="3"/>
  <text x="784" y="314" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#143B52">Health Connect</text>
  <text x="784" y="360" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#5E6B72">Weight + body fat</text>
  <text x="784" y="390" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#5E6B72">written with stable IDs</text>
  <rect x="784" y="430" width="130" height="42" rx="21" fill="#DFF3E6"/>
  <text x="811" y="457" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#246B3B">Deduplicated</text>
  <rect x="1078" y="254" width="280" height="248" rx="32" fill="#FFFDF8" stroke="#D7D0C5" stroke-width="3"/>
  <text x="1114" y="314" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#143B52">Garmin Connect</text>
  <text x="1114" y="360" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#5E6B72">May read Health Connect</text>
  <text x="1114" y="390" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#5E6B72">on supported setups</text>
  <rect x="1114" y="430" width="118" height="42" rx="21" fill="#FCE8DC"/>
  <text x="1143" y="457" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#9B4B17">Verify locally</text>
  <path d="M370 378H408" stroke="#D86C2B" stroke-width="10" stroke-linecap="round"/>
  <path d="M700 378H738" stroke="#D86C2B" stroke-width="10" stroke-linecap="round"/>
  <path d="M1030 378H1068" stroke="#D86C2B" stroke-width="10" stroke-linecap="round"/>
  <path d="M395 358L423 378L395 398" stroke="#D86C2B" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M725 358L753 378L725 398" stroke="#D86C2B" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M1055 358L1083 378L1055 398" stroke="#D86C2B" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="88" y="574" width="1270" height="264" rx="36" fill="#FFFDF8" stroke="#D7D0C5" stroke-width="3"/>
  <text x="126" y="632" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#143B52">Why the bridge is still meaningful</text>
  <text x="126" y="684" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#5D696F">• Wyze can write to Health Connect directly, but it tends to request a much broader permission set.</text>
  <text x="126" y="722" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#5D696F">• This app limits itself to scale import and the specific write permissions for weight and body fat.</text>
  <text x="126" y="760" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#5D696F">• Garmin support appears more promising now through Health Connect, but you should still verify the actual</text>
  <text x="126" y="792" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#5D696F">  weight and body-fat behavior on your own phone and Garmin Connect version.</text>
</svg>
